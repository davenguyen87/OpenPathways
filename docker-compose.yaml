# Open Pathways Cloud — Coolify deploy compose (repo root).
#
# Lives at the repo root because Coolify's docker-compose build pack
# expects /docker-compose.yaml by default. Bundles web + worker + minio
# + bucket-init in one stack so they share a Docker network natively.
# Postgres is a separate Coolify-managed resource referenced via
# DATABASE_URL set in the Coolify env-var UI.
#
# For local dev (full stack including Postgres + bind-mounted mail
# capture dir), use cloud/docker-compose.yml instead.

services:
  web:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    restart: unless-stopped
    # Run as root so we can bind to port 80 (Coolify's default proxy
    # target). The Playwright base image's pwuser can't bind low ports.
    # No sensitive on-disk state in the container that warrants pwuser
    # isolation — uploads go to MinIO, sessions+jobs to Postgres.
    user: root
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      OPEN_PATHWAYS_MODE: hosted
      # Auth adapter. `magic-link` (default) requires ALLOWLIST_* + SMTP_*.
      # `none` disables auth entirely — TESTING ONLY; anyone with the URL
      # gets in. Flip back to magic-link by removing this var in Coolify.
      AUTH_ADAPTER: ${AUTH_ADAPTER:-magic-link}
      # Listen on port 80 inside the container so Coolify's auto-Traefik
      # routing (which targets port 80 by default for docker-compose
      # apps) reaches us without needing docker_compose_domains config.
      OPEN_PATHWAYS_PORT: "80"
      OPEN_PATHWAYS_BEHIND_TLS: ${OPEN_PATHWAYS_BEHIND_TLS:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      DB_DRIVER: postgres
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-op-uploads}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: us-east-1
      WORKER_QUEUE: pgboss
      RATE_LIMIT_STORE: postgres
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWLIST_EMAIL_DOMAINS: ${ALLOWLIST_EMAIL_DOMAINS:-}
      ALLOWLIST_EMAILS: ${ALLOWLIST_EMAILS:-}
      MAIL_CAPTURE_DIR: ${MAIL_CAPTURE_DIR:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Open Pathways <noreply@example.com>}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      OPEN_PATHWAYS_RETENTION_DAYS: ${OPEN_PATHWAYS_RETENTION_DAYS:-30}
      QUOTA_CONCURRENT_JOBS: ${QUOTA_CONCURRENT_JOBS:-2}
      QUOTA_UPLOADS_PER_DAY: ${QUOTA_UPLOADS_PER_DAY:-50}
      QUOTA_STORED_BYTES: ${QUOTA_STORED_BYTES:-5368709120}
      QUOTA_STORED_BYTES_TOTAL: ${QUOTA_STORED_BYTES_TOTAL:-0}
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:80/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      # 60s start_period (was 30s) — the cloud requires Postgres + MinIO ready
      # before /api/health can return 200, and on Coolify cold-start that
      # warm-up sometimes pushes past 30s. The shorter window led Coolify to
      # mark the container running:unhealthy during the v3.0.1 rollout even
      # though the app was actually serving fine. Wider buffer here removes
      # the false-unhealthy window during deploy transitions.
      start_period: 60s
    volumes:
      - mail:/var/op/mail
    # Attach to the shared coolify network so we can reach Coolify-managed
    # Postgres at its DB UUID hostname (wjwu91xm4f3jz2njh61m528j:5432).
    # Default per-stack network keeps minio reachable as just `minio`.
    networks:
      - default
      - coolify

  worker:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: ["node", "cloud/worker/index.js"]
    environment:
      OPEN_PATHWAYS_MODE: hosted
      # Match the web service's auth adapter so the worker's allowlist /
      # SMTP guards mirror what the web side enforces.
      AUTH_ADAPTER: ${AUTH_ADAPTER:-magic-link}
      DB_DRIVER: postgres
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-op-uploads}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: us-east-1
      WORKER_QUEUE: pgboss
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWLIST_EMAIL_DOMAINS: ${ALLOWLIST_EMAIL_DOMAINS:-}
      ALLOWLIST_EMAILS: ${ALLOWLIST_EMAILS:-}
      MAIL_CAPTURE_DIR: ${MAIL_CAPTURE_DIR:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Open Pathways <noreply@example.com>}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"
    volumes:
      - mail:/var/op/mail
    networks:
      - default
      - coolify

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"

  # One-shot: create the bucket if it doesn't exist, then exit. Re-runs
  # idempotently on every deploy.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} >/dev/null 2>&1; do
        echo 'waiting for minio...'; sleep 1;
      done &&
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-op-uploads} &&
      echo 'bucket ${S3_BUCKET:-op-uploads} ready'
      "

volumes:
  minio-data:
  mail:

networks:
  coolify:
    external: true
